<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Car | Luxury Drive</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">LUXURY<span>DRIVE</span></div>
            <ul>
                <li><a href="shub.html">Home</a></li>
                <li><a href="baar.html">Cars</a></li>
                <li><a href="dheere.html">Pricing</a></li>
                <li><a href="baarka.html" class="active">Booking</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section class="booking-section">
            <h1>Reservation Form</h1>
            <form class="booking-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" required>
                </div>
                <div class="form-group">
                    <label>Pickup Location</label>
                    <input type="text" required>
                </div>
                <div class="form-group">
                    <label>Select Car</label>
                    <select>
                        <option>Mercedes E-Class</option>
                        <option>Range Rover</option>
                    </select>
                </div>
                <button type="submit" class="btn">Confirm Booking</button>
            </form>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Luxury Drive Rental. All Rights Reserved.</p>
        </div>
    </footer>
</body>
</html>
